<!DOCTYPE html>

<head>
  <link rel="stylesheet" href="/css/output.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>

  {{ partial "head.html" . }}
</head>
<body>

    {{ partial "nav.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
